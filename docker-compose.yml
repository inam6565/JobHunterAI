version: '3.9'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:17.6-alpine3.22
    environment:
      POSTGRES_DB: jobhunterai
      POSTGRES_USER: jobhunterai
      POSTGRES_PASSWORD: jobhunterai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
