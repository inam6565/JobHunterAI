services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jobhunterai_net
    restart: unless-stopped

  db:
    image: postgres:17.6-alpine3.22
    environment:
      POSTGRES_DB: jobhunterai
      POSTGRES_USER: jobhunterai
      POSTGRES_PASSWORD: jobhunterai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jobhunterai -d jobhunterai']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobhunterai_net
    restart: unless-stopped

networks:
  jobhunterai_net:
    driver: bridge

volumes:
  postgres_data:
